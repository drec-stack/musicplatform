    <div id="loader">

            <div class="sidebar-header">

                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="28" height="28">

            </div>

        <main id="main">
            <header id="topbar">
                <div class="search-container">
                    <div class="search-input-wrapper">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                            <circle cx="11" cy="11" r="8"/>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                        <input type="text" id="globalSearch" placeholder="Search library..." autocomplete="off">
                        <span class="search-shortcut">Ctrl+K</span>
                    </div>
                </div>
                <div class="topbar-actions">
                    <button class="btn-icon" id="exportBtn" title="Export library">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>

                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                    </button>
                </div>
            </header>
            <div id="content">
                <div class="loading-container">
                    <div class="loading-spinner"></div>
                    <span>Loading...</span>
                </div>
            </div>
        </main>
        
        <footer id="player">
            <div class="player-container">
                <div class="player-track">
                    <div class="player-cover" id="playerCover">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="24" height="24">
                            <path d="M9 18V5l12-2v13"/>
                            <circle cx="6" cy="18" r="3"/>
                            <circle cx="18" cy="16" r="3"/>
                        </svg>
                    </div>
                    <div class="player-info">
                        <div class="player-title" id="playerTitle">Nothing playing</div>
                        <div class="player-artist" id="playerArtist">Select a track</div>
                    </div>
                    <button class="btn-icon" id="playerAddToPlaylistBtn" title="Add to playlist">

                            <line x1="12" y1="5" x2="12" y2="19"/>
                            <line x1="5" y1="12" x2="19" y2="12"/>
                        </svg>
                    </button>
                </div>
                <div class="player-center">
                    <div class="player-buttons">
                        <button class="player-btn" id="shuffleBtn" title="Shuffle">

                                <polyline points="21 16 21 21 16 21"/>
                                <line x1="15" y1="15" x2="21" y2="21"/>
                                <line x1="4" y1="4" x2="9" y2="9"/>
                            </svg>
                        </button>
                        <button class="player-btn" id="prevBtn" title="Previous">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                                <polygon points="19 20 9 12 19 4 19 20"/>
                                <line x1="5" y1="19" x2="5" y2="5"/>
                            </svg>
                        </button>
                        <button class="player-btn-play" id="playBtn" title="Play">
                            <svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1" width="20" height="20" id="playIcon">
                                <polygon points="5 3 19 12 5 21 5 3"/>
                            </svg>
                        </button>
                        <button class="player-btn" id="nextBtn" title="Next">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                                <polygon points="5 4 15 12 5 20 5 4"/>
                                <line x1="19" y1="5" x2="19" y2="19"/>
                            </svg>
                        </button>
                        <button class="player-btn" id="repeatBtn" title="Repeat">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                                <polyline points="17 1 21 5 17 9"/>
                                <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
                                <polyline points="7 23 3 19 7 15"/>
                                <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
                            </svg>
                        </button>
                    </div>
                    <div class="player-progress">
                        <span class="player-time" id="currentTime">0:00</span>

                            <div class="player-progress-fill" id="progressFill"></div>
                        </div>

                    </div>
                </div>
                <div class="player-right">

                                <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
                            </svg>
                        </button>
                        <input type="range" class="player-volume-slider" id="volumeSlider" min="0" max="100" value="70">
                    </div>
                </div>
            </div>
        </footer>
    </div>
    
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal-content" id="modal-content"></div>
    </div>
    
    <div class="notification-container" id="notificationContainer"></div>

    <script>
    if (!window.indexedDB) {
        document.getElementById('loaderError').textContent = 'Your browser does not support IndexedDB. Please use Chrome, Firefox, Safari or Edge.';
        document.getElementById('loaderError').style.display = 'block';
        document.body.classList.add('error');
    }
    </script>

<div class="theme-toggle" id="themeToggle" title="Switch theme">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
</div>

<script>
    // Переключение темы
    const themeToggle = document.getElementById('themeToggle');
    const savedTheme = localStorage.getItem('musichub_theme');
    if (savedTheme === 'light') document.body.classList.add('light-theme');
    
    themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('light-theme');
        localStorage.setItem('musichub_theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
    });
</script>
