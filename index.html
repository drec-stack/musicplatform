<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0a0f">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>MusicHub - Independent Music Platform</title>
    
    <!-- Critical inline styles for initial render -->
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #111118;
            --bg-tertiary: #1a1a24;
            --bg-hover: #1e1e2a;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --accent: #7c3aed;
            --accent-hover: #8b5cf6;
            --accent-bg: rgba(124, 58, 237, 0.1);
            --border: #1f1f2e;
            --border-light: #2a2a3a;
            --green: #22c55e;
            --red: #ef4444;
            --sidebar-width: 260px;
            --topbar-height: 64px;
            --player-height: 80px;
            --radius: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --transition: 0.2s ease;
        }
        
        html, body {
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 14px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        body { display: flex; align-items: center; justify-content: center; }
        
        #app { display: none; width: 100%; height: 100%; }
        body.loaded #app { display: grid; grid-template-columns: var(--sidebar-width) 1fr; grid-template-rows: 1fr var(--player-height); }
        body.error #app { display: none !important; }
        
        #loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 16px;
        }
        
        body.loaded #loader { display: none; }
        body.error #loader { display: flex !important; }
        
        #loader .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-light);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        #loader .loader-text {
            font-size: 16px;
            color: var(--text-secondary);
        }
        
        #loader .loader-error {
            color: var(--red);
            text-align: center;
            max-width: 500px;
            padding: 20px;
        }
        
        #loader .loader-error h2 {
            margin-bottom: 8px;
            font-size: 20px;
        }
        
        #loader .loader-error p {
            margin-bottom: 4px;
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        #loader .loader-error button {
            margin-top: 16px;
            padding: 10px 24px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 14px;
        }
        
        #loader .loader-error button:hover {
            background: var(--accent-hover);
        }
        
        a { color: inherit; text-decoration: none; }
        button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; font-size: inherit; }
        input { font-family: inherit; color: inherit; background: none; border: none; outline: none; font-size: inherit; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #3a3a4a; }
        
        /* Basic layout fallback styles */
        #sidebar {
            grid-row: 1 / 3;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            z-index: 10;
        }
        
        #main {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        #topbar {
            height: var(--topbar-height);
            padding: 0 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border);
            z-index: 5;
        }
        
        #content {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }
        
        #player {
            grid-column: 2;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            z-index: 10;
        }
        
        /* Sidebar header */
        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid var(--border);
        }
        
        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .sidebar-logo svg {
            width: 28px;
            height: 28px;
            color: var(--accent);
            flex-shrink: 0;
        }
        
        .sidebar-logo span {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        
        /* Navigation */
        .sidebar-nav {
            padding: 12px 8px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex-shrink: 0;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: var(--radius);
            color: var(--text-secondary);
            transition: all var(--transition);
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
        }
        
        .nav-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        
        .nav-item.active {
            background: var(--accent-bg);
            color: var(--accent-hover);
        }
        
        .nav-item svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }
        
        /* Divider */
        .sidebar-divider {
            height: 1px;
            background: var(--border);
            margin: 8px 16px;
        }
        
        /* Section */
        .sidebar-section {
            padding: 0 8px;
        }
        
        .sidebar-section-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            padding: 8px 12px;
        }
        
        .sidebar-stats {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 0 12px;
        }
        
        .sidebar-stat {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .stat-value {
            font-weight: 600;
            font-size: 14px;
        }
        
        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
        }
        
        .services-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        
        .service-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: var(--radius);
            font-size: 13px;
            color: var(--text-secondary);
        }
        
        .service-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        
        .sidebar-footer {
            margin-top: auto;
            padding: 12px 8px;
            border-top: 1px solid var(--border);
        }
        
        /* Search */
        .search-container {
            flex: 1;
            max-width: 600px;
        }
        
        .search-input-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 10px 16px;
            transition: all var(--transition);
        }
        
        .search-input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-bg);
        }
        
        .search-input-wrapper svg {
            width: 18px;
            height: 18px;
            color: var(--text-muted);
            flex-shrink: 0;
        }
        
        .search-input-wrapper input {
            flex: 1;
        }
        
        .search-input-wrapper input::placeholder {
            color: var(--text-muted);
        }
        
        .search-shortcut {
            font-size: 11px;
            color: var(--text-muted);
            background: var(--bg-hover);
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid var(--border-light);
        }
        
        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
        }
        
        .btn-icon {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius);
            color: var(--text-secondary);
            transition: all var(--transition);
            cursor: pointer;
        }
        
        .btn-icon:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        
        .btn-icon svg {
            width: 20px;
            height: 20px;
        }
        
        /* Loading */
        .loading-container {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px;
            gap: 12px;
            color: var(--text-secondary);
        }
        
        .loading-spinner {
            width: 24px;
            height: 24px;
            border: 2px solid var(--border-light);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        /* Player fallback */
        .player-container {
            display: grid;
            grid-template-columns: 280px 1fr 280px;
            align-items: center;
            height: 100%;
            padding: 0 16px;
            gap: 16px;
        }
        
        .player-track {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }
        
        .player-track-cover-placeholder {
            width: 48px;
            height: 48px;
            border-radius: 4px;
            background: var(--bg-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .player-track-cover-placeholder svg {
            color: var(--text-muted);
        }
        
        .player-track-info {
            min-width: 0;
        }
        
        .player-track-title {
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .player-track-artist {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .player-track-actions {
            display: flex;
            gap: 4px;
        }
        
        .player-main {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }
        
        .player-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .player-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            color: var(--text-secondary);
            transition: all var(--transition);
            cursor: pointer;
        }
        
        .player-btn:hover {
            color: var(--text-primary);
        }
        
        .player-btn-play {
            width: 40px;
            height: 40px;
            background: var(--text-primary);
            color: var(--bg-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            cursor: pointer;
        }
        
        .player-btn-play:hover {
            transform: scale(1.05);
        }
        
        .player-btn-play svg {
            width: 18px;
            height: 18px;
        }
        
        .player-progress {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }
        
        .player-time {
            font-size: 11px;
            color: var(--text-muted);
            width: 36px;
            text-align: center;
            flex-shrink: 0;
        }
        
        .player-progress-bar {
            flex: 1;
            height: 4px;
            background: var(--bg-hover);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }
        
        .player-progress-bar:hover {
            height: 6px;
        }
        
        .player-progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            position: relative;
            transition: width 0.1s linear;
            width: 0%;
        }
        
        .player-progress-thumb {
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            background: var(--text-primary);
            border-radius: 50%;
            opacity: 0;
            transition: opacity var(--transition);
        }
        
        .player-progress-bar:hover .player-progress-thumb {
            opacity: 1;
        }
        
        .player-extras {
            display: flex;
            align-items: center;
            gap: 4px;
            justify-content: flex-end;
        }
        
        .player-volume {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .player-volume-slider {
            width: 80px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: var(--bg-hover);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }
        
        .player-volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: var(--text-primary);
            border-radius: 50%;
            cursor: pointer;
        }
        
        .player-volume-slider::-moz-range-thumb {
            width: 12px;
            height: 12px;
            background: var(--text-primary);
            border-radius: 50%;
            border: none;
            cursor: pointer;
        }
        
        /* Notifications */
        .notification-container {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .notification {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 14px 18px;
            font-size: 13px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            animation: slideIn 0.3s ease;
            max-width: 360px;
        }
        
        .notification.success { border-color: var(--green); }
        .notification.error { border-color: var(--red); }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(4px);
        }
        
        .modal-overlay.hidden {
            display: none;
        }
        
        .modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 24px;
            max-width: 480px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: 600;
        }
        
        .modal-close {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
        }
        
        .modal-close:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        
        /* Utility */
        .hidden { display: none !important; }
        .text-muted { color: var(--text-muted); }
        .text-sm { font-size: 12px; }
        .mt-2 { margin-top: 8px; }
        .mt-4 { margin-top: 16px; }
        .mb-4 { margin-bottom: 16px; }
        
        /* Form elements */
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--text-secondary); }
        .form-input {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 14px;
            transition: border-color var(--transition);
        }
        .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg); }
        .form-hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
        
        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 500;
            transition: all var(--transition);
            cursor: pointer;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-secondary { background: var(--bg-tertiary); border: 1px solid var(--border); color: var(--text-primary); }
        .btn-secondary:hover { background: var(--bg-hover); border-color: var(--border-light); }
        .btn-sm { padding: 6px 12px; font-size: 12px; }
        
        /* Tabs */
        .tabs { display: flex; gap: 4px; background: var(--bg-secondary); padding: 4px; border-radius: var(--radius); border: 1px solid var(--border); }
        .tab { padding: 6px 14px; border-radius: 6px; font-size: 13px; color: var(--text-secondary); cursor: pointer; transition: all var(--transition); }
        .tab:hover { color: var(--text-primary); }
        .tab.active { background: var(--accent); color: white; }
        
        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-muted);
        }
        .empty-state p { font-size: 15px; margin-bottom: 4px; }
        .empty-state span { font-size: 13px; }
    </style>
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        <div class="loader-text">Loading MusicHub...</div>
    </div>
    
    <div id="app">
        <aside id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 18V5l12-2v13"/>
                        <circle cx="6" cy="18" r="3"/>
                        <circle cx="18" cy="16" r="3"/>
                    </svg>
                    <span>MusicHub</span>
                </div>
            </div>
            <nav class="sidebar-nav" id="sidebarNav">
                <a class="nav-item active" data-page="home">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    Home
                </a>
                <a class="nav-item" data-page="library">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                    Library
                </a>
                <a class="nav-item" data-page="search">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    Search
                </a>
                <a class="nav-item" data-page="upload">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    Upload
                </a>
                <a class="nav-item" data-page="import">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
                    Import
                </a>
                <a class="nav-item" data-page="playlists">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                    Playlists
                </a>
            </nav>
            <div class="sidebar-divider"></div>
            <div class="sidebar-section">
                <div class="sidebar-section-title">Library Stats</div>
                <div class="sidebar-stats" id="sidebarStats">
                    <span class="text-muted text-sm">Loading...</span>
                </div>
            </div>
            <div class="sidebar-divider"></div>
            <div class="sidebar-section">
                <div class="sidebar-section-title">Connected Services</div>
                <div class="services-list" id="sidebarServices">
                    <span class="text-muted text-sm">Loading...</span>
                </div>
            </div>
            <div class="sidebar-footer">
                <a class="nav-item" data-page="settings">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    Settings
                </a>
            </div>
        </aside>
        
        <main id="main">
            <header id="topbar">
                <div class="search-container">
                    <div class="search-input-wrapper">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <input type="text" id="globalSearch" placeholder="Search your library..." autocomplete="off">
                        <span class="search-shortcut">Ctrl+K</span>
                    </div>
                </div>
                <div class="topbar-actions">
                    <button class="btn-icon" id="exportBtn" title="Export library">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    </button>
                </div>
            </header>
            <div id="content">
                <div class="loading-container">
                    <div class="loading-spinner"></div>
                    <span>Loading...</span>
                </div>
            </div>
        </main>
        
        <footer id="player">
            <div class="player-container">
                <div class="player-track">
                    <div class="player-track-cover-placeholder" id="playerCover">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" width="24" height="24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
                    </div>
                    <div class="player-track-info">
                        <div class="player-track-title" id="playerTitle">Nothing playing</div>
                        <div class="player-track-artist" id="playerArtist">Select a track</div>
                    </div>
                    <div class="player-track-actions">
                        <button class="btn-icon" id="playerAddToPlaylistBtn" title="Add to playlist">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        </button>
                    </div>
                </div>
                <div class="player-main">
                    <div class="player-controls">
                        <button class="player-btn" id="shuffleBtn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
                        </button>
                        <button class="player-btn" id="prevBtn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                        </button>
                        <button class="player-btn-play" id="playBtn">
                            <svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1" id="playIcon"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                        </button>
                        <button class="player-btn" id="nextBtn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                        </button>
                        <button class="player-btn" id="repeatBtn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
                        </button>
                    </div>
                    <div class="player-progress">
                        <span class="player-time" id="currentTime">0:00</span>
                        <div class="player-progress-bar" id="progressBar">
                            <div class="player-progress-fill" id="progressFill" style="width:0%">
                                <div class="player-progress-thumb"></div>
                            </div>
                        </div>
                        <span class="player-time" id="totalTime">0:00</span>
                    </div>
                </div>
                <div class="player-extras">
                    <div class="player-volume">
                        <button class="btn-icon" id="volumeBtn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                        </button>
                        <input type="range" class="player-volume-slider" id="volumeSlider" min="0" max="100" value="70">
                    </div>
                </div>
            </div>
        </footer>
    </div>
    
    <div id="modal-overlay" class="modal-overlay hidden">
        <div id="modal-content" class="modal-content"></div>
    </div>

    <script>
    // Basic browser check
    if (!window.indexedDB) {
        document.getElementById('loader').innerHTML = 
            '<div class="loader-error">' +
            '<h2>Browser not supported</h2>' +
            '<p>Your browser does not support IndexedDB which is required for local music storage.</p>' +
            '<p>Please use Chrome 49+, Firefox 44+, Safari 10+, Edge 12+, or Opera 36+</p>' +
            '</div>';
        document.body.classList.add('error');
    }
    </script>
    
    <script src="js/polyfills.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/database.js"></script>
    <script src="js/services.js"></script>
    <script src="js/player.js"></script>
    <script src="js/queue.js"></script>
    <script src="js/library.js"></script>
    <script src="js/upload.js"></script>
    <script src="js/importer.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
    
    <script>
    document.body.classList.add('loaded');
    </script>
</body>
</html>
