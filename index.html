<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0f">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>MusicHub - Ваша музыкальная платформа</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/player.css">
    <link rel="stylesheet" href="css/themes.css">
</head>
<body>
    <!-- Floating Background Balls -->
    <div class="floating-balls">
        <div class="floating-ball"></div>
        <div class="floating-ball"></div>
        <div class="floating-ball"></div>
        <div class="floating-ball"></div>
        <div class="floating-ball"></div>
    </div>

    <!-- Loader -->
    <div id="loader">
        <div class="loader-spinner"></div>
        <div class="loader-text">MusicHub is loading...</div>
        <div class="loader-error" id="loaderError"></div>
    </div>
    
    <!-- Main App -->
    <div id="app" class="hidden">
        <!-- Sidebar -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="28" height="28">
                        <path d="M9 18V5l12-2v13"/>
                        <circle cx="6" cy="18" r="3"/>
                        <circle cx="18" cy="16" r="3"/>
                    </svg>
                    <span>MusicHub</span>
                </div>
            </div>
            <nav class="sidebar-nav" id="sidebarNav"></nav>
            <div class="sidebar-divider"></div>
            <div class="sidebar-section">
                <div class="sidebar-section-title">LIBRARY STATS</div>
                <div class="sidebar-stats" id="sidebarStats">
                    <div class="stat-skeleton">Loading...</div>
                </div>
            </div>
            <div class="sidebar-footer">
                <a class="nav-item" data-page="settings">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                    Settings
                </a>
            </div>
        </aside>
        
        <!-- Main Content Area -->
        <main id="main">
            <!-- Topbar -->
            <header id="topbar">
                <div class="search-container">
                    <div class="search-input-wrapper">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                            <circle cx="11" cy="11" r="8"/>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                        <input type="text" id="globalSearch" placeholder="Поиск в библиотеке..." autocomplete="off">
                        <span class="search-shortcut">Ctrl+K</span>
                    </div>
                </div>
                <div class="topbar-actions">
                    <button class="btn-icon" id="exportBtn" title="Export library">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                    </button>
                </div>
            </header>
            
            <!-- Dynamic Content -->
            <div id="content">
                <div class="loading-container">
                    <div class="loading-spinner"></div>
                    <span>Загрузка...</span>
                </div>
            </div>
        </main>
        
        <!-- Player Footer -->
        <footer id="player">
            <div class="player-container">
                <!-- Track Info Block -->
                <div class="player-track-block">
                    <div class="player-cover" id="playerCover">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="26" height="26">
                            <path d="M9 18V5l12-2v13"/>
                            <circle cx="6" cy="18" r="3"/>
                            <circle cx="18" cy="16" r="3"/>
                        </svg>
                    </div>
                    <div class="player-track-info">
                        <div class="player-track-title" id="playerTitle">Ничего не играет</div>
                        <div class="player-track-artist" id="playerArtist">Выберите трек</div>
                    </div>
                    <button class="player-add-btn" id="playerAddToPlaylistBtn" title="Add to playlist">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                            <line x1="12" y1="5" x2="12" y2="19"/>
                            <line x1="5" y1="12" x2="19" y2="12"/>
                        </svg>
                    </button>
                    <div class="player-equalizer" id="playerEqualizer" style="display: none;">
                        <div class="equalizer-bar"></div>
                        <div class="equalizer-bar"></div>
                        <div class="equalizer-bar"></div>
                        <div class="equalizer-bar"></div>
                        <div class="equalizer-bar"></div>
                    </div>
                </div>
                
                <!-- Player Controls Block -->
                <div class="player-controls-block">
                    <div class="player-buttons">
                        <button class="player-btn" id="shuffleBtn" title="Shuffle">🔀</button>
                        <button class="player-btn" id="prevBtn" title="Previous">⏮</button>
                        <button class="player-play-btn" id="playBtn" title="Play">
                            <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22" id="playIcon">
                                <polygon points="5 3 19 12 5 21 5 3"/>
                            </svg>
                        </button>
                        <button class="player-btn" id="nextBtn" title="Next">⏭</button>
                        <button class="player-btn" id="repeatBtn" title="Repeat">🔁</button>
                    </div>
                    <div class="player-progress-block">
                        <span class="player-time" id="currentTime">0:00</span>
                        <div class="player-progress-bar" id="progressBar">
                            <div class="player-progress-fill" id="progressFill"></div>
                        </div>
                        <span class="player-time" id="totalTime">0:00</span>
                    </div>
                </div>
                
                <!-- Volume Control Block -->
                <div class="player-volume-block">
                    <button class="player-volume-btn" id="volumeBtn" title="Volume">🔊</button>
                    <input type="range" class="player-volume-slider" id="volumeSlider" min="0" max="100" value="70">
                </div>
            </div>
        </footer>
    </div>
    
    <!-- Modals -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal-content" id="modal-content"></div>
    </div>
    
    <!-- Notifications -->
    <div class="notification-container" id="notificationContainer"></div>

    <!-- Initialization Scripts -->
    <script>
        // Check IndexedDB support
        if (!window.indexedDB) {
            var loaderError = document.getElementById('loaderError');
            if (loaderError) {
                loaderError.textContent = 'Ваш браузер не поддерживает IndexedDB. Пожалуйста, используйте Chrome, Firefox, Safari или Edge.';
                loaderError.style.display = 'block';
            }
            document.body.classList.add('error');
        }
    </script>
    
    <!-- Core Scripts (in correct order) -->
    <script src="js/polyfills.js"></script>
    <script src="js/database.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/services.js"></script>
    <script src="js/api.js"></script>
    <script src="js/queue.js"></script>
    <script src="js/player.js"></script>
    <script src="js/library.js"></script>
    <script src="js/upload.js"></script>
    <script src="js/importer.js"></script>
    <script src="js/search.js"></script>
    <script src="js/favorites.js"></script>
    <script src="js/radio.js"></script>
    <script src="js/visualizer.js"></script>
    <script src="js/export.js"></script>
    <script src="js/contextmenu.js"></script>
    <script src="js/hotkeys.js"></script>
    <script src="js/dragqueue.js"></script>
    <script src="js/nowplaying.js"></script>
    <script src="js/sleeptimer.js"></script>
    <script src="js/crossfade.js"></script>
    
    <!-- UI and App (LAST!) -->
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
