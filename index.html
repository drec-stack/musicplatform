<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0f">
    <title>MusicHub - Ваша музыкальная платформа</title>
    <style>
        /* Базовые стили без backdrop-filter для Safari */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0f;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        /* Водный фон без blur для Safari */
        .water-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 30% 40%, rgba(29, 185, 84, 0.1) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 60%, rgba(30, 215, 96, 0.08) 0%, transparent 60%);
            z-index: -5;
        }
        
        .water-wave {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 100%;
            pointer-events: none;
            z-index: -4;
        }
        
        .wave-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .wave-1 {
            background: repeating-linear-gradient(transparent, transparent 98%, rgba(29, 185, 84, 0.06) 98%, rgba(29, 185, 84, 0.06) 100%);
            animation: waveMove1 8s ease-in-out infinite;
        }
        
        .wave-2 {
            background: repeating-linear-gradient(transparent, transparent 97%, rgba(30, 215, 96, 0.08) 97%, rgba(30, 215, 96, 0.08) 100%);
            animation: waveMove2 12s ease-in-out infinite;
        }
        
        .wave-3 {
            background: repeating-linear-gradient(transparent, transparent 99%, rgba(29, 185, 84, 0.1) 99%, rgba(29, 185, 84, 0.1) 100%);
            animation: waveMove3 6s ease-in-out infinite;
        }
        
        @keyframes waveMove1 {
            0%, 100% { transform: translateX(0) translateY(0); }
            25% { transform: translateX(-2%) translateY(-1%); }
            50% { transform: translateX(0%) translateY(-2%); }
            75% { transform: translateX(2%) translateY(-1%); }
        }
        
        @keyframes waveMove2 {
            0%, 100% { transform: translateX(0) scaleY(1); }
            33% { transform: translateX(-3%) scaleY(1.02); }
            66% { transform: translateX(3%) scaleY(0.98); }
        }
        
        @keyframes waveMove3 {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-1%); }
            40% { transform: translateX(1.5%); }
            60% { transform: translateX(-2%); }
            80% { transform: translateX(2%); }
        }
        
        /* Loader */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0a0a0f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.5s ease;
        }
        
        #loader.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .loader-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(29, 185, 84, 0.2);
            border-top-color: #1db954;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loader-text {
            margin-top: 20px;
            color: #b3b3b3;
            font-size: 14px;
        }
        
        /* App Layout */
        #app {
            display: flex;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        
        #app:not(.hidden) {
            opacity: 1;
        }
        
        .hidden {
            display: none !important;
        }
        
        /* Sidebar */
        #sidebar {
            width: 260px;
            background: rgba(10, 10, 15, 0.9);
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            height: 100vh;
            overflow-y: auto;
        }
        
        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            font-weight: bold;
            color: #1db954;
        }
        
        .sidebar-logo svg {
            stroke: #1db954;
        }
        
        .sidebar-nav {
            flex: 1;
            padding: 20px 12px;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            color: #b3b3b3;
            border-radius: 8px;
            transition: all 0.2s ease;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
        }
        
        .nav-item:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
        }
        
        .nav-item.active {
            background: #1db954;
            color: white;
        }
        
        .sidebar-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 16px 20px;
        }
        
        .sidebar-section {
            padding: 0 20px 20px;
        }
        
        .sidebar-section-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #7a7a7a;
            margin-bottom: 12px;
        }
        
        .sidebar-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .sidebar-stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-value {
            display: block;
            font-size: 20px;
            font-weight: bold;
            color: #1db954;
        }
        
        .stat-label {
            font-size: 11px;
            color: #7a7a7a;
            margin-top: 4px;
        }
        
        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: auto;
        }
        
        /* Main Content */
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        #topbar {
            height: 64px;
            background: rgba(10, 10, 15, 0.9);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
        }
        
        .search-container {
            flex: 1;
            max-width: 400px;
        }
        
        .search-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .search-input-wrapper svg {
            position: absolute;
            left: 14px;
            color: #7a7a7a;
        }
        
        #globalSearch {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            padding: 10px 40px 10px 42px;
            border-radius: 9999px;
            font-size: 14px;
        }
        
        #globalSearch:focus {
            outline: none;
            border-color: #1db954;
        }
        
        .search-shortcut {
            position: absolute;
            right: 14px;
            color: #7a7a7a;
            font-size: 12px;
        }
        
        .topbar-actions {
            display: flex;
            gap: 12px;
        }
        
        .btn-icon {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #b3b3b3;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .btn-icon:hover {
            background: #1db954;
            color: white;
        }
        
        /* Content */
        #content {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
        }
        
        /* Page */
        .page {
            animation: fadeIn 0.4s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .page-header {
            margin-bottom: 32px;
        }
        
        .page-title {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(135deg, #fff 0%, #1db954 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .page-subtitle {
            color: #b3b3b3;
            font-size: 14px;
            margin-top: 8px;
        }
        
        /* Quick Actions */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
            margin-bottom: 48px;
        }
        
        .action-card {
            background: rgba(30, 30, 42, 0.8);
            padding: 24px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .action-card:hover {
            transform: translateY(-6px);
            background: rgba(29, 185, 84, 0.2);
            border-color: #1db954;
        }
        
        .action-icon {
            font-size: 32px;
            margin-bottom: 12px;
            display: block;
        }
        
        /* Sections */
        .section {
            margin-bottom: 48px;
        }
        
        .section-header {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }
        
        .section-title {
            font-size: 24px;
            font-weight: bold;
        }
        
        .section-link {
            color: #7a7a7a;
            font-size: 13px;
            cursor: pointer;
        }
        
        .section-link:hover {
            color: #1db954;
        }
        
        /* Track List */
        .track-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .track-row {
            display: grid;
            grid-template-columns: 40px 1fr 60px;
            align-items: center;
            gap: 16px;
            padding: 12px 16px;
            background: rgba(30, 30, 42, 0.6);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .track-row:hover {
            background: rgba(37, 37, 48, 0.8);
            transform: translateX(4px);
            border-color: rgba(29, 185, 84, 0.3);
        }
        
        .track-row-index {
            color: #7a7a7a;
            font-size: 14px;
            text-align: center;
        }
        
        .track-row-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .track-row-cover-placeholder {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .track-row-title {
            font-weight: 500;
            margin-bottom: 4px;
        }
        
        .track-row-artist {
            font-size: 12px;
            color: #7a7a7a;
        }
        
        .track-row-duration {
            font-size: 12px;
            color: #7a7a7a;
            text-align: right;
        }
        
        /* Grid layouts */
        .playlist-grid, .album-grid, .artist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }
        
        .playlist-card, .album-card, .artist-card {
            background: rgba(30, 30, 42, 0.8);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .playlist-card:hover, .album-card:hover, .artist-card:hover {
            transform: translateY(-6px);
            background: rgba(29, 185, 84, 0.2);
            border-color: #1db954;
        }
        
        .playlist-card-cover, .album-card-cover, .artist-card-avatar {
            width: 100%;
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            font-size: 48px;
        }
        
        .playlist-card-name, .album-card-name, .artist-card-name {
            font-weight: 500;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .playlist-card-count, .album-card-artist, .artist-card-info {
            font-size: 12px;
            color: #7a7a7a;
        }
        
        /* Buttons */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 9999px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .btn-primary {
            background: #1db954;
            color: white;
        }
        
        .btn-primary:hover {
            background: #1ed760;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
        }
        
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #7a7a7a;
        }
        
        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        /* Loading */
        .loading-container {
            text-align: center;
            padding: 60px 20px;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(29, 185, 84, 0.2);
            border-top-color: #1db954;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        
        .modal-overlay.hidden {
            display: none;
        }
        
        .modal-content {
            background: #1a1a24;
            border-radius: 16px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .modal-close {
            font-size: 28px;
            cursor: pointer;
            color: #7a7a7a;
        }
        
        .form-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 14px;
        }
        
        /* Notifications */
        .notification-container {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .notification {
            background: #1a1a24;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            animation: slideIn 0.3s ease;
            border-left: 3px solid #1db954;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(100%); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        /* Player */
        #player {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 15, 0.95);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 24px;
            z-index: 100;
        }
        
        .player-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }
        
        .player-track-block {
            display: flex;
            align-items: center;
            gap: 16px;
            min-width: 240px;
        }
        
        .player-cover {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .player-track-info {
            flex: 1;
        }
        
        .player-track-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }
        
        .player-track-artist {
            font-size: 12px;
            color: #b3b3b3;
        }
        
        .player-controls-block {
            flex: 1;
            max-width: 400px;
        }
        
        .player-buttons {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 8px;
        }
        
        .player-btn {
            background: none;
            border: none;
            color: #b3b3b3;
            cursor: pointer;
            font-size: 20px;
            padding: 8px;
        }
        
        .player-btn:hover {
            color: #ffffff;
        }
        
        .player-play-btn {
            background: #1db954;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
        }
        
        .player-progress-block {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .player-time {
            font-size: 12px;
            color: #b3b3b3;
            min-width: 40px;
        }
        
        .player-progress-bar {
            flex: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            cursor: pointer;
        }
        
        .player-progress-fill {
            height: 100%;
            background: #1db954;
            border-radius: 10px;
            width: 0%;
        }
        
        .player-volume-block {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 120px;
        }
        
        .player-volume-slider {
            width: 80px;
            height: 4px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
        
        .player-volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #1db954;
            border-radius: 50%;
            cursor: pointer;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .player-track-block { min-width: 180px; }
            .player-volume-slider { width: 60px; }
            .playlist-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
            #content { padding: 20px; }
        }
        
        @media (max-width: 640px) {
            #sidebar { display: none; }
            .track-row { grid-template-columns: 30px 1fr 50px; }
        }
        
        .mt-4 { margin-top: 16px; }
        .text-muted { color: #7a7a7a; }
    </style>
</head>
<body>
    <!-- Водный фон -->
    <div class="water-bg"></div>
    <div class="water-wave">
        <div class="wave-layer wave-1"></div>
        <div class="wave-layer wave-2"></div>
        <div class="wave-layer wave-3"></div>
    </div>

    <!-- Loader -->
    <div id="loader">
        <div class="loader-spinner"></div>
        <div class="loader-text">MusicHub is loading...</div>
        <div class="loader-error" id="loaderError"></div>
    </div>
    
    <!-- Main App -->
    <div id="app" class="hidden">
        <!-- Sidebar -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="28" height="28">
                        <path d="M9 18V5l12-2v13"/>
                        <circle cx="6" cy="18" r="3"/>
                        <circle cx="18" cy="16" r="3"/>
                    </svg>
                    <span>MusicHub</span>
                </div>
            </div>
            <nav class="sidebar-nav" id="sidebarNav"></nav>
            <div class="sidebar-divider"></div>
            <div class="sidebar-section">
                <div class="sidebar-section-title">LIBRARY STATS</div>
                <div class="sidebar-stats" id="sidebarStats">
                    <div class="sidebar-stat">
                        <span class="stat-value" id="trackCount">0</span>
                        <span class="stat-label">треков</span>
                    </div>
                    <div class="sidebar-stat">
                        <span class="stat-value" id="playlistCount">0</span>
                        <span class="stat-label">плейлистов</span>
                    </div>
                </div>
            </div>
            <div class="sidebar-footer">
                <a class="nav-item" data-page="settings">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                    Settings
                </a>
            </div>
        </aside>
        
        <!-- Main Content Area -->
        <main id="main">
            <header id="topbar">
                <div class="search-container">
                    <div class="search-input-wrapper">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                            <circle cx="11" cy="11" r="8"/>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                        <input type="text" id="globalSearch" placeholder="Поиск в библиотеке..." autocomplete="off">
                        <span class="search-shortcut">Ctrl+K</span>
                    </div>
                </div>
                <div class="topbar-actions">
                    <button class="btn-icon" id="exportBtn" title="Export library">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                    </button>
                </div>
            </header>
            
            <div id="content">
                <div class="loading-container">
                    <div class="loading-spinner"></div>
                    <span>Загрузка...</span>
                </div>
            </div>
        </main>
        
        <footer id="player">
            <div class="player-container">
                <div class="player-track-block">
                    <div class="player-cover" id="playerCover">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="24" height="24">
                            <path d="M9 18V5l12-2v13"/>
                            <circle cx="6" cy="18" r="3"/>
                            <circle cx="18" cy="16" r="3"/>
                        </svg>
                    </div>
                    <div class="player-track-info">
                        <div class="player-track-title" id="playerTitle">Ничего не играет</div>
                        <div class="player-track-artist" id="playerArtist">Выберите трек</div>
                    </div>
                </div>
                
                <div class="player-controls-block">
                    <div class="player-buttons">
                        <button class="player-btn" id="shuffleBtn" title="Shuffle">🔀</button>
                        <button class="player-btn" id="prevBtn" title="Previous">⏮</button>
                        <button class="player-play-btn" id="playBtn" title="Play">▶</button>
                        <button class="player-btn" id="nextBtn" title="Next">⏭</button>
                        <button class="player-btn" id="repeatBtn" title="Repeat">🔁</button>
                    </div>
                    <div class="player-progress-block">
                        <span class="player-time" id="currentTime">0:00</span>
                        <div class="player-progress-bar" id="progressBar">
                            <div class="player-progress-fill" id="progressFill"></div>
                        </div>
                        <span class="player-time" id="totalTime">0:00</span>
                    </div>
                </div>
                
                <div class="player-volume-block">
                    <button class="player-btn" id="volumeBtn" title="Volume">🔊</button>
                    <input type="range" class="player-volume-slider" id="volumeSlider" min="0" max="100" value="70">
                </div>
            </div>
        </footer>
    </div>
    
    <!-- Modals -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal-content" id="modal-content"></div>
    </div>
    
    <div class="notification-container" id="notificationContainer"></div>

    <script>
        // Проверка поддержки IndexedDB
        if (!window.indexedDB) {
            var loaderError = document.getElementById('loaderError');
            if (loaderError) {
                loaderError.textContent = 'Ваш браузер не поддерживает IndexedDB. Пожалуйста, используйте Chrome, Firefox, Safari или Edge.';
                loaderError.style.display = 'block';
            }
            document.body.classList.add('error');
        }
    </script>
    
    <!-- Core Scripts -->
    <script src="js/polyfills.js"></script>
    <script src="js/database.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/queue.js"></script>
    <script src="js/player.js"></script>
    <script src="js/library.js"></script>
    <script src="js/upload.js"></script>
    <script src="js/favorites.js"></script>
    <script src="js/export.js"></script>
    
    <!-- UI and App -->
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
