<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusicHub - Музыкальная платформа</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
        }

        /* Анимация фона */
        .bg {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 30% 40%, rgba(29, 185, 84, 0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 60%, rgba(30, 215, 96, 0.05) 0%, transparent 50%);
            z-index: -1;
        }

        /* Загрузчик */
        #loader {
            position: fixed;
            inset: 0;
            background: #0a0a0f;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.3s;
        }
        #loader.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(29, 185, 84, 0.2);
            border-top-color: #1db954;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Приложение */
        .app {
            display: flex;
            height: 100vh;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .app.visible {
            opacity: 1;
        }

        /* Сайдбар */
        .sidebar {
            width: 260px;
            background: rgba(18, 18, 26, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255, 255, 255, 0.06);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 24px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            font-size: 18px;
            font-weight: 600;
            color: #1db954;
        }
        .logo svg {
            width: 28px;
            height: 28px;
        }
        .nav {
            flex: 1;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            border-radius: 10px;
            cursor: pointer;
            color: #b3b3b3;
            transition: all 0.2s;
            font-size: 14px;
            font-weight: 500;
        }
        .nav-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }
        .nav-item.active {
            background: #1db954;
            color: #fff;
        }
        .nav-item svg {
            width: 20px;
            height: 20px;
        }
        .stats {
            padding: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        .stats-title {
            font-size: 11px;
            text-transform: uppercase;
            color: #7a7a7a;
            margin-bottom: 12px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-value {
            font-size: 20px;
            font-weight: 600;
            color: #1db954;
        }
        .stat-label {
            font-size: 11px;
            color: #7a7a7a;
        }
        .sidebar-footer {
            padding: 20px;
        }

        /* Основной контент */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .topbar {
            height: 64px;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
        }
        .search-wrapper {
            position: relative;
            width: 300px;
        }
        .search-wrapper svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: #7a7a7a;
        }
        .search-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 10px 16px 10px 44px;
            border-radius: 40px;
            color: #fff;
            font-size: 14px;
        }
        .search-input:focus {
            outline: none;
            border-color: #1db954;
        }
        .btn-icon {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .btn-icon:hover {
            background: #1db954;
        }
        .btn-icon svg {
            width: 18px;
            height: 18px;
            color: #b3b3b3;
        }
        .btn-icon:hover svg {
            color: #fff;
        }

        /* Контент */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
        }
        .page {
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .page-header {
            margin-bottom: 32px;
        }
        .page-title {
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #1db954);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .page-subtitle {
            color: #b3b3b3;
            font-size: 14px;
            margin-top: 8px;
        }

        /* Сетка действий */
        .actions-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 48px;
        }
        .action-card {
            background: rgba(30, 30, 42, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .action-card:hover {
            transform: translateY(-4px);
            background: rgba(29, 185, 84, 0.1);
            border-color: #1db954;
        }
        .action-card svg {
            width: 28px;
            height: 28px;
            color: #1db954;
            margin-bottom: 12px;
        }
        .action-card span {
            display: block;
            font-size: 14px;
            font-weight: 500;
        }

        /* Список треков */
        .track-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .track-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 16px;
            background: rgba(30, 30, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .track-item:hover {
            background: rgba(37, 37, 48, 0.7);
            border-color: rgba(29, 185, 84, 0.2);
        }
        .track-index {
            width: 28px;
            font-size: 13px;
            color: #7a7a7a;
        }
        .track-info {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .track-cover {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .track-cover svg {
            width: 20px;
            height: 20px;
            color: #7a7a7a;
        }
        .track-name {
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 4px;
        }
        .track-artist {
            font-size: 12px;
            color: #7a7a7a;
        }
        .track-duration {
            font-size: 13px;
            color: #7a7a7a;
        }
        .track-fav {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
        }
        .track-fav svg {
            width: 18px;
            height: 18px;
            color: #7a7a7a;
        }
        .track-fav.active svg {
            color: #1db954;
            fill: #1db954;
        }

        /* Сетка плейлистов */
        .playlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }
        .playlist-card {
            background: rgba(30, 30, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .playlist-card:hover {
            transform: translateY(-4px);
            background: rgba(29, 185, 84, 0.1);
            border-color: #1db954;
        }
        .playlist-card svg {
            width: 48px;
            height: 48px;
            color: #7a7a7a;
            margin-bottom: 12px;
        }
        .playlist-name {
            font-weight: 500;
            margin-bottom: 4px;
        }
        .playlist-count {
            font-size: 12px;
            color: #7a7a7a;
        }

        /* Пустое состояние */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #7a7a7a;
        }
        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* Кнопки */
        .btn-primary {
            background: #1db954;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            color: #fff;
            cursor: pointer;
        }
        .btn-primary:hover {
            background: #1ed760;
        }

        /* Плеер */
        .player {
            position: fixed;
            bottom: 0;
            left: 260px;
            right: 0;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding: 12px 24px;
        }
        .player-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
        }
        .player-track {
            display: flex;
            align-items: center;
            gap: 14px;
            min-width: 220px;
        }
        .player-cover {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .player-cover svg {
            width: 24px;
            height: 24px;
        }
        .player-title {
            font-weight: 500;
            font-size: 14px;
        }
        .player-artist {
            font-size: 12px;
            color: #7a7a7a;
        }
        .player-controls {
            flex: 1;
            max-width: 400px;
        }
        .control-buttons {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 8px;
        }
        .control-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .control-btn svg {
            width: 20px;
            height: 20px;
            color: #b3b3b3;
        }
        .control-btn:hover svg {
            color: #fff;
        }
        .play-btn {
            background: #1db954;
            width: 40px;
            height: 40px;
        }
        .play-btn svg {
            color: #fff;
            width: 22px;
            height: 22px;
        }
        .progress-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .time-current, .time-total {
            font-size: 12px;
            color: #7a7a7a;
            min-width: 40px;
        }
        .progress-bar {
            flex: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
        }
        .progress-fill {
            height: 100%;
            background: #1db954;
            border-radius: 10px;
            width: 0%;
        }
        .player-volume {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 120px;
        }
        .volume-slider {
            width: 80px;
            height: 4px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #1db954;
            border-radius: 50%;
            cursor: pointer;
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            background: #1a1a24;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            padding: 24px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-title {
            font-size: 18px;
            font-weight: 600;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            color: #7a7a7a;
            cursor: pointer;
        }
        .modal-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 8px;
            color: #fff;
            margin-bottom: 16px;
        }

        /* Уведомления */
        .toast {
            position: fixed;
            top: 80px;
            right: 20px;
            background: #1a1a24;
            padding: 12px 20px;
            border-radius: 8px;
            border-left: 3px solid #1db954;
            animation: slideIn 0.3s ease;
            z-index: 1100;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 768px) {
            .sidebar { width: 200px; }
            .player { left: 200px; }
            .actions-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 640px) {
            .sidebar { display: none; }
            .player { left: 0; }
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    
    <div id="loader">
        <div class="spinner"></div>
    </div>
    
    <div id="app" class="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M9 18V5l12-2v13"/>
                    <circle cx="6" cy="18" r="3"/>
                    <circle cx="18" cy="16" r="3"/>
                </svg>
                <span>MusicHub</span>
            </div>
            <nav class="nav" id="nav">
                <div class="nav-item active" data-page="home">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                        <polyline points="9 22 9 12 15 12 15 22"/>
                    </svg>
                    <span>Главная</span>
                </div>
                <div class="nav-item" data-page="library">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M4 6h16v12H4z"/>
                        <line x1="8" y1="10" x2="16" y2="10"/>
                        <line x1="8" y1="14" x2="12" y2="14"/>
                    </svg>
                    <span>Библиотека</span>
                </div>
                <div class="nav-item" data-page="playlists">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M2 4h20v16H2z"/>
                        <line x1="8" y1="8" x2="16" y2="8"/>
                        <line x1="8" y1="12" x2="12" y2="12"/>
                    </svg>
                    <span>Плейлисты</span>
                </div>
            </nav>
            <div class="stats">
                <div class="stats-title">Библиотека</div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="trackCount">0</div>
                        <div class="stat-label">треков</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="playlistCount">0</div>
                        <div class="stat-label">плейлистов</div>
                    </div>
                </div>
            </div>
            <div class="sidebar-footer">
                <div class="nav-item" data-page="settings">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                    <span>Настройки</span>
                </div>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main">
            <header class="topbar">
                <div class="search-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                    <input type="text" class="search-input" id="searchInput" placeholder="Поиск">
                </div>
                <button class="btn-icon" id="exportBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                </button>
            </header>
            <div class="content" id="content"></div>
        </main>
        
        <!-- Player -->
        <footer class="player">
            <div class="player-inner">
                <div class="player-track">
                    <div class="player-cover">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M9 18V5l12-2v13"/>
                            <circle cx="6" cy="18" r="3"/>
                            <circle cx="18" cy="16" r="3"/>
                        </svg>
                    </div>
                    <div>
                        <div class="player-title" id="playerTitle">Nothing playing</div>
                        <div class="player-artist" id="playerArtist">Select a track</div>
                    </div>
                </div>
                <div class="player-controls">
                    <div class="control-buttons">
                        <button class="control-btn" id="prevBtn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <polygon points="19 20 9 12 19 4 19 20"/>
                                <line x1="5" y1="19" x2="5" y2="5"/>
                            </svg>
                        </button>
                        <button class="control-btn play-btn" id="playBtn">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <polygon points="5 3 19 12 5 21 5 3"/>
                            </svg>
                        </button>
                        <button class="control-btn" id="nextBtn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <polygon points="5 4 15 12 5 20 5 4"/>
                                <line x1="19" y1="5" x2="19" y2="19"/>
                            </svg>
                        </button>
                    </div>
                    <div class="progress-container">
                        <span class="time-current" id="currentTime">0:00</span>
                        <div class="progress-bar" id="progressBar">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                        <span class="time-total" id="totalTime">0:00</span>
                    </div>
                </div>
                <div class="player-volume">
                    <button class="control-btn" id="volumeBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
                        </svg>
                    </button>
                    <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="70">
                </div>
            </div>
        </footer>
    </div>
    
    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Создать плейлист</h3>
                <button class="modal-close" id="modalClose">×</button>
            </div>
            <input type="text" class="modal-input" id="modalInput" placeholder="Название">
            <button class="btn-primary" id="modalConfirm" style="width:100%;">Создать</button>
        </div>
    </div>

    <script>
        // ========================================
        // ПОЛНОСТЬЮ РАБОЧЕЕ ПРИЛОЖЕНИЕ
        // ========================================
        
        (function() {
            // Данные
            var tracks = [];
            var playlists = [];
            var currentPage = 'home';
            var currentTrack = null;
            var isPlaying = false;
            var progressInterval = null;
            
            // Демо треки
            var demoData = [
                { id: '1', title: 'Midnight Dreams', artist: 'Electronic Beats', duration: 214, favorite: false },
                { id: '2', title: 'Urban Flow', artist: 'City Lights', duration: 183, favorite: false },
                { id: '3', title: 'Chill Session', artist: 'Lofi Study', duration: 245, favorite: false },
                { id: '4', title: 'Rock Anthem', artist: 'The Thunder', duration: 198, favorite: false },
                { id: '5', title: 'Jazz Evening', artist: 'Smooth Trio', duration: 312, favorite: false },
                { id: '6', title: 'Acoustic Sunrise', artist: 'Folk Guitarist', duration: 267, favorite: false },
                { id: '7', title: 'Deep House', artist: 'Club Mixer', duration: 356, favorite: false },
                { id: '8', title: 'Smooth R&B', artist: 'Soul Singer', duration: 234, favorite: false }
            ];
            
            // Демо плейлисты
            var demoPlaylists = [
                { id: 'pl1', name: 'Favorites', tracks: ['1', '3', '5'] },
                { id: 'pl2', name: 'Workout', tracks: ['2', '4', '7'] }
            ];
            
            // Загрузка из localStorage
            function loadData() {
                var savedTracks = localStorage.getItem('musichub_tracks');
                var savedPlaylists = localStorage.getItem('musichub_playlists');
                
                if (savedTracks) {
                    tracks = JSON.parse(savedTracks);
                } else {
                    tracks = demoData;
                    saveData();
                }
                
                if (savedPlaylists) {
                    playlists = JSON.parse(savedPlaylists);
                } else {
                    playlists = demoPlaylists;
                    saveData();
                }
                
                updateStats();
            }
            
            // Сохранение
            function saveData() {
                localStorage.setItem('musichub_tracks', JSON.stringify(tracks));
                localStorage.setItem('musichub_playlists', JSON.stringify(playlists));
            }
            
            // Обновление статистики
            function updateStats() {
                document.getElementById('trackCount').textContent = tracks.length;
                document.getElementById('playlistCount').textContent = playlists.length;
            }
            
            // Форматирование времени
            function formatTime(seconds) {
                if (!seconds) return '0:00';
                var mins = Math.floor(seconds / 60);
                var secs = Math.floor(seconds % 60);
                return mins + ':' + (secs < 10 ? '0' : '') + secs;
            }
            
            // Уведомление
            function notify(msg) {
                var toast = document.createElement('div');
                toast.className = 'toast';
                toast.textContent = msg;
                document.body.appendChild(toast);
                setTimeout(function() {
                    toast.remove();
                }, 3000);
            }
            
            // Рендер треков
            function renderTracks(tracksList, containerId, showFav = true) {
                var container = document.getElementById(containerId);
                if (!container) return;
                
                if (!tracksList || tracksList.length === 0) {
                    container.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg><p>Нет треков</p></div>';
                    return;
                }
                
                var html = '';
                for (var i = 0; i < tracksList.length; i++) {
                    var track = tracksList[i];
                    html += '<div class="track-item" data-id="' + track.id + '">' +
                        '<div class="track-index">' + (i + 1) + '</div>' +
                        '<div class="track-info">' +
                            '<div class="track-cover"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>' +
                            '<div>' +
                                '<div class="track-name">' + escapeHtml(track.title) + '</div>' +
                                '<div class="track-artist">' + escapeHtml(track.artist) + '</div>' +
                            '</div>' +
                        '</div>' +
                        '<div class="track-duration">' + formatTime(track.duration) + '</div>';
                    
                    if (showFav) {
                        html += '<button class="track-fav" data-id="' + track.id + '">' +
                            '<svg viewBox="0 0 24 24" fill="' + (track.favorite ? '#1db954' : 'none') + '" stroke="currentColor" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>' +
                        '</button>';
                    }
                    
                    html += '</div>';
                }
                container.innerHTML = html;
                
                // Обработчики
                container.querySelectorAll('.track-item').forEach(function(item) {
                    item.addEventListener('click', function(e) {
                        if (e.target.closest('.track-fav')) return;
                        var id = item.dataset.id;
                        var track = tracks.find(function(t) { return t.id === id; });
                        if (track) playTrack(track);
                    });
                    
                    var favBtn = item.querySelector('.track-fav');
                    if (favBtn) {
                        favBtn.addEventListener('click', function(e) {
                            e.stopPropagation();
                            var id = favBtn.dataset.id;
                            var track = tracks.find(function(t) { return t.id === id; });
                            if (track) {
                                track.favorite = !track.favorite;
                                saveData();
                                renderCurrentPage();
                                notify(track.favorite ? 'В избранном' : 'Удалено из избранного');
                            }
                        });
                    }
                });
            }
            
            // Рендер плейлистов
            function renderPlaylists() {
                var container = document.getElementById('playlistsContainer');
                if (!container) return;
                
                if (playlists.length === 0) {
                    container.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h20v16H2z"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="12" y2="12"/></svg><p>Нет плейлистов</p><button class="btn-primary" id="createEmptyBtn">Создать плейлист</button></div>';
                    
                    var createBtn = document.getElementById('createEmptyBtn');
                    if (createBtn) {
                        createBtn.addEventListener('click', function() { showCreatePlaylistModal(); });
                    }
                    return;
                }
                
                var html = '<div class="playlist-grid">';
                for (var i = 0; i < playlists.length; i++) {
                    var pl = playlists[i];
                    html += '<div class="playlist-card" data-id="' + pl.id + '">' +
                        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h20v16H2z"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="12" y2="12"/></svg>' +
                        '<div class="playlist-name">' + escapeHtml(pl.name) + '</div>' +
                        '<div class="playlist-count">' + (pl.tracks ? pl.tracks.length : 0) + ' треков</div>' +
                    '</div>';
                }
                html += '</div>';
                container.innerHTML = html;
                
                container.querySelectorAll('.playlist-card').forEach(function(card) {
                    card.addEventListener('click', function() {
                        showPlaylistDetail(card.dataset.id);
                    });
                });
            }
            
            // Показать детали плейлиста
            function showPlaylistDetail(id) {
                var playlist = playlists.find(function(p) { return p.id === id; });
                if (!playlist) return;
                
                var playlistTracks = (playlist.tracks || []).map(function(tid) {
                    return tracks.find(function(t) { return t.id === tid; });
                }).filter(function(t) { return t; });
                
                var container = document.getElementById('content');
                container.innerHTML = '<div class="page">' +
                    '<div class="page-header">' +
                        '<button class="btn-primary" id="backBtn" style="margin-bottom:16px; background:#333;">← Назад</button>' +
                        '<h1 class="page-title">' + escapeHtml(playlist.name) + '</h1>' +
                        '<p class="page-subtitle">' + playlistTracks.length + ' треков</p>' +
                    '</div>' +
                    '<div id="playlistTracks" class="track-list"></div>' +
                    '<div style="display:flex; gap:12px; margin-top:20px;">' +
                        '<button class="btn-primary" id="playAllBtn">▶ Играть все</button>' +
                        '<button class="btn-primary" id="deletePlaylistBtn" style="background:#dc3545;">🗑 Удалить</button>' +
                    '</div>' +
                '</div>';
                
                renderTracks(playlistTracks, 'playlistTracks', true);
                
                document.getElementById('backBtn').addEventListener('click', function() {
                    goToPage('playlists');
                });
                
                document.getElementById('playAllBtn').addEventListener('click', function() {
                    if (playlistTracks.length > 0) playTrack(playlistTracks[0]);
                });
                
                document.getElementById('deletePlaylistBtn').addEventListener('click', function() {
                    if (confirm('Удалить плейлист "' + playlist.name + '"?')) {
                        playlists = playlists.filter(function(p) { return p.id !== id; });
                        saveData();
                        goToPage('playlists');
                        notify('Плейлист удалён');
                    }
                });
            }
            
            // Показать создание плейлиста
            function showCreatePlaylistModal() {
                var modal = document.getElementById('modal');
                var input = document.getElementById('modalInput');
                input.value = '';
                document.getElementById('modalTitle').textContent = 'Создать плейлист';
                modal.classList.add('show');
                
                var confirmBtn = document.getElementById('modalConfirm');
                var closeBtn = document.getElementById('modalClose');
                
                var oldConfirm = confirmBtn.onclick;
                var oldClose = closeBtn.onclick;
                
                confirmBtn.onclick = function() {
                    var name = input.value.trim();
                    if (name) {
                        var newPlaylist = {
                            id: Date.now().toString(),
                            name: name,
                            tracks: []
                        };
                        playlists.push(newPlaylist);
                        saveData();
                        modal.classList.remove('show');
                        goToPage('playlists');
                        notify('Плейлист создан');
                    }
                    confirmBtn.onclick = oldConfirm;
                    closeBtn.onclick = oldClose;
                };
                
                closeBtn.onclick = function() {
                    modal.classList.remove('show');
                    closeBtn.onclick = oldClose;
                };
            }
            
            // Воспроизведение
            function playTrack(track) {
                if (progressInterval) clearInterval(progressInterval);
                
                currentTrack = track;
                isPlaying = true;
                
                document.getElementById('playerTitle').textContent = track.title;
                document.getElementById('playerArtist').textContent = track.artist;
                
                var duration = track.duration;
                var current = 0;
                
                progressInterval = setInterval(function() {
                    if (isPlaying && current < duration) {
                        current++;
                        var percent = (current / duration) * 100;
                        document.getElementById('progressFill').style.width = percent + '%';
                        document.getElementById('currentTime').textContent = formatTime(current);
                        document.getElementById('totalTime').textContent = formatTime(duration);
                    } else if (current >= duration) {
                        clearInterval(progressInterval);
                        isPlaying = false;
                        document.getElementById('progressFill').style.width = '0%';
                        document.getElementById('currentTime').textContent = '0:00';
                    }
                }, 1000);
            }
            
            function togglePlay() {
                if (!currentTrack) return;
                isPlaying = !isPlaying;
                if (!isPlaying && progressInterval) {
                    clearInterval(progressInterval);
                    progressInterval = null;
                } else if (isPlaying && !progressInterval) {
                    playTrack(currentTrack);
                }
            }
            
            // Рендер страницы
            function renderCurrentPage() {
                var container = document.getElementById('content');
                
                if (currentPage === 'home') {
                    var recent = tracks.slice(-5).reverse();
                    container.innerHTML = '<div class="page">' +
                        '<div class="page-header">' +
                            '<h1 class="page-title">Добро пожаловать</h1>' +
                            '<p class="page-subtitle">Ваша музыкальная платформа</p>' +
                        '</div>' +
                        '<div class="actions-grid">' +
                            '<div class="action-card" data-page="library"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6h16v12H4z"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="12" y2="14"/></svg><span>Библиотека</span></div>' +
                            '<div class="action-card" data-page="playlists"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h20v16H2z"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="12" y2="12"/></svg><span>Плейлисты</span></div>' +
                        '</div>' +
                        '<div class="section">' +
                            '<h2 style="margin-bottom:20px;">Недавние треки</h2>' +
                            '<div id="recentTracks" class="track-list"></div>' +
                        '</div>' +
                    '</div>';
                    
                    renderTracks(recent, 'recentTracks', true);
                    
                    document.querySelectorAll('.action-card').forEach(function(card) {
                        card.addEventListener('click', function() {
                            goToPage(card.dataset.page);
                        });
                    });
                    
                } else if (currentPage === 'library') {
                    container.innerHTML = '<div class="page">' +
                        '<div class="page-header">' +
                            '<h1 class="page-title">Библиотека</h1>' +
                            '<p class="page-subtitle">Все треки</p>' +
                        '</div>' +
                        '<div id="allTracks" class="track-list"></div>' +
                    '</div>';
                    renderTracks(tracks, 'allTracks', true);
                    
                } else if (currentPage === 'playlists') {
                    container.innerHTML = '<div class="page">' +
                        '<div class="page-header">' +
                            '<h1 class="page-title">Плейлисты</h1>' +
                            '<button class="btn-primary" id="createPlaylistBtn" style="margin-top:16px;">+ Создать</button>' +
                        '</div>' +
                        '<div id="playlistsContainer"></div>' +
                    '</div>';
                    
                    renderPlaylists();
                    
                    document.getElementById('createPlaylistBtn').addEventListener('click', function() {
                        showCreatePlaylistModal();
                    });
                    
                } else if (currentPage === 'settings') {
                    container.innerHTML = '<div class="page">' +
                        '<div class="page-header">' +
                            '<h1 class="page-title">Настройки</h1>' +
                        '</div>' +
                        '<div style="background:rgba(30,30,42,0.6); border-radius:12px; padding:24px; margin-bottom:20px;">' +
                            '<h3 style="margin-bottom:16px;">Данные</h3>' +
                            '<button class="btn-primary" id="exportDataBtn" style="margin-right:12px;">Экспорт</button>' +
                            '<button class="btn-primary" id="clearDataBtn" style="background:#dc3545;">Очистить всё</button>' +
                        '</div>' +
                        '<div style="background:rgba(30,30,42,0.6); border-radius:12px; padding:24px;">' +
                            '<h3 style="margin-bottom:16px;">О приложении</h3>' +
                            '<p>MusicHub v2.0.0</p>' +
                        '</div>' +
                    '</div>';
                    
                    document.getElementById('exportDataBtn').addEventListener('click', function() {
                        var data = { tracks: tracks, playlists: playlists };
                        var blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
                        var url = URL.createObjectURL(blob);
                        var a = document.createElement('a');
                        a.href = url;
                        a.download = 'musichub-backup.json';
                        a.click();
                        URL.revokeObjectURL(url);
                        notify('Экспорт завершён');
                    });
                    
                    document.getElementById('clearDataBtn').addEventListener('click', function() {
                        if (confirm('Удалить все данные? Отменить нельзя!')) {
                            tracks = demoData.slice();
                            playlists = demoPlaylists.slice();
                            saveData();
                            updateStats();
                            goToPage('home');
                            notify('Данные очищены');
                        }
                    });
                }
                
                updateActiveNav();
            }
            
            function updateActiveNav() {
                document.querySelectorAll('.nav-item').forEach(function(item) {
                    if (item.dataset.page === currentPage) {
                        item.classList.add('active');
                    } else {
                        item.classList.remove('active');
                    }
                });
            }
            
            function goToPage(page) {
                currentPage = page;
                renderCurrentPage();
            }
            
            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                });
            }
            
            // Инициализация
            function init() {
                loadData();
                renderCurrentPage();
                updateStats();
                
                // Навигация
                document.querySelectorAll('.nav-item').forEach(function(item) {
                    item.addEventListener('click', function() {
                        goToPage(item.dataset.page);
                    });
                });
                
                // Плеер
                document.getElementById('playBtn').addEventListener('click', togglePlay);
                document.getElementById('prevBtn').addEventListener('click', function() {
                    if (!currentTrack) return;
                    var index = tracks.findIndex(function(t) { return t.id === currentTrack.id; });
                    if (index > 0) playTrack(tracks[index - 1]);
                });
                document.getElementById('nextBtn').addEventListener('click', function() {
                    if (!currentTrack) return;
                    var index = tracks.findIndex(function(t) { return t.id === currentTrack.id; });
                    if (index < tracks.length - 1) playTrack(tracks[index + 1]);
                });
                
                // Громкость
                var volumeSlider = document.getElementById('volumeSlider');
                if (volumeSlider) {
                    volumeSlider.addEventListener('input', function(e) {
                        var vol = e.target.value;
                        var volBtn = document.getElementById('volumeBtn');
                        if (volBtn) {
                            volBtn.innerHTML = vol == 0 ? '🔇' : (vol < 30 ? '🔈' : (vol < 70 ? '🔉' : '🔊'));
                        }
                    });
                }
                
                // Прогресс бар
                var progressBar = document.getElementById('progressBar');
                if (progressBar) {
                    progressBar.addEventListener('click', function(e) {
                        if (!currentTrack) return;
                        var rect = progressBar.getBoundingClientRect();
                        var percent = (e.clientX - rect.left) / rect.width;
                        var seekTime = percent * currentTrack.duration;
                        // Перемотка
                    });
                }
                
                // Скрыть лоадер
                setTimeout(function() {
                    var loader = document.getElementById('loader');
                    var app = document.getElementById('app');
                    if (loader && app) {
                        loader.classList.add('hidden');
                        app.classList.add('visible');
                    }
                }, 500);
                
                console.log('MusicHub готов!');
            }
            
            // Запуск
            init();
        })();
    </script>
</body>
</html>
